# Backend
backend = "xrender";          
vsync = true;

# Transparency
inactive-opacity = 0.85;   # Unfocused windows ~85% opaque
active-opacity   = 0.85;   # Focused windows also ~85% opaque
frame-opacity    = 0.85;   # Borders ~85% opaque

# No per-application rules — all windows follow the same transparency
opacity-rule = [
  "100:class_g = 'firefox-esr'",
  "100:class_g = 'dmenu'"
];


# Shadows
shadow = false;             

# Fading
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

#Fixing transparency issue
use-damage = false;

# Misc
detect-client-opacity = true;
use-ewmh-active-win = true;

